# AstroEditorPro keyboard shortcuts
#
# Edit values after '=' and save this file.
# Changes are reloaded automatically while AstroEditorPro is running.
# Use Qt-style shortcuts, e.g. Ctrl+B, Ctrl+Shift+S, Alt+F, F5.
# Leave a shortcut blank only if you also edit the code to tolerate blank values.

# Toggle bold formatting on selected/stored text or current typing style.
bold = Ctrl+B

# Toggle italic formatting on selected/stored text or current typing style.
italic = Ctrl+I

# Toggle underline formatting on selected/stored text or current typing style.
underline = Ctrl+U

# Copy selected text or selected embedded object.
copy = Ctrl+C

# Paste from clipboard.
paste = Ctrl+V

# Store selected text in the persistent copy-storage list.
store_copy_block = Ctrl+Shift+C

# Open copy-storage popup and paste the selected stored text.
paste_copy_block = Ctrl+Shift+V

# Select all text in the current tab.
select_all = Ctrl+A

# Open a new blank tab.
new_tab = Ctrl+T

# Open another editor window.
new_window = Ctrl+N

# Close the current tab.
close_tab = Ctrl+W

# Save the current tab.
save = Ctrl+S

# Save current file as a separate copy elsewhere and close the original tab.
save_as_copy_close = Ctrl+Shift+S

# Open a readable text/rich document file.
open = Ctrl+O

# Open the find bar.
find = Ctrl+F

# Open the find and replace bar.
find_replace = Ctrl+H

# Undo previous save/autosave snapshot.
undo = Ctrl+Z

# Redo next save/autosave snapshot.
redo = Ctrl+Shift+Z

# Indent selected/current line by 4 spaces.
indent_lines = Tab

# Remove one 4-space/tab indent from selected/current line.
outdent_lines = Shift+Tab

# Toggle synchronized editable split view.
toggle_split_view = Ctrl+Alt+V

# Open a workspace folder.
open_workspace = Ctrl+Alt+O

# Export the current document.
export_document = Ctrl+Alt+E

# Insert image currently in clipboard.
insert_clipboard_image = Ctrl+Alt+I

# Clear stored multi-selections.
clear_multi_selection = Esc

# Bookmark jumps. Bookmark A is the first bookmark in the current tab, B the second, etc.

# Jump to bookmark A.
bookmark_A = Alt+A

# Jump to bookmark B.
bookmark_B = Alt+B

# Jump to bookmark C.
bookmark_C = Alt+C

# Jump to bookmark D.
bookmark_D = Alt+D

# Jump to bookmark E.
bookmark_E = Alt+E

# Jump to bookmark F.
bookmark_F = Alt+F

# Jump to bookmark G.
bookmark_G = Alt+G

# Jump to bookmark H.
bookmark_H = Alt+H

# Jump to bookmark I.
bookmark_I = Alt+I

# Jump to bookmark J.
bookmark_J = Alt+J

# Jump to bookmark K.
bookmark_K = Alt+K

# Jump to bookmark L.
bookmark_L = Alt+L

# Jump to bookmark M.
bookmark_M = Alt+M

# Jump to bookmark N.
bookmark_N = Alt+N

# Jump to bookmark O.
bookmark_O = Alt+O

# Jump to bookmark P.
bookmark_P = Alt+P

# Jump to bookmark Q.
bookmark_Q = Alt+Q

# Jump to bookmark R.
bookmark_R = Alt+R

# Jump to bookmark S.
bookmark_S = Alt+S

# Jump to bookmark T.
bookmark_T = Alt+T

# Jump to bookmark U.
bookmark_U = Alt+U

# Jump to bookmark V.
bookmark_V = Alt+V

# Jump to bookmark W.
bookmark_W = Alt+W

# Jump to bookmark X.
bookmark_X = Alt+X

# Jump to bookmark Y.
bookmark_Y = Alt+Y

# Jump to bookmark Z.
bookmark_Z = Alt+Z
